<!DOCTYPE html>
<html lang="hr">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        {% block title %}{% endblock %}
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a
            class="navbar-brand"
            href="/"
        >
            🏔️ Planinarski dnevnik
        </a>

        <div class="navbar-nav">

            <a
                class="nav-link"
                href="/"
            >
                Home
            </a>

            <a
                class="nav-link"
                href="/izleti"
            >
                Izleti
            </a>

            <a
                class="nav-link"
                href="/dodaj"
            >
                Dodaj izlet
            </a>

            <a
                class="nav-link"
                href="/statistika"
            >
                Statistika
            </a>

        </div>

    </div>

</nav>


<div class="container mt-5">

    {% block body %}
    {% endblock %}

</div>

</body>
</html>
